name: Atualizar Site de Noticias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install google-generativeai feedparser beautifulsoup4 pytz

      - name: Rodar Script de Noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Publicar alteracoes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Garante que a pasta existe para o Git não reclamar
          mkdir -p materia
          
          # Adiciona tudo o que foi alterado/criado
          git add .
          
          # Commita apenas se houver mudanças reais
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update: Noticias e Materias [$(date)]" && git push)
