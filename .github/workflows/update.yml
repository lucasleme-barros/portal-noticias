name: Atualizar Site de Notícias

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada hora
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para salvar a pasta /materia

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install google-generativeai feedparser beautifulsoup4 pytz

      - name: Rodar Script de Notícias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Publicar alterações
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html materia/*.html # Garante que as novas matérias entrem
          git commit -m "Update: Novas notícias e matérias individuais [$(date)]" || exit 0
          git push
