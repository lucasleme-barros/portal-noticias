name: Atualizar Site de Notícias

on:
  schedule:
    - cron: '0 * * * *'   # Tenta rodar no minuto 0
    - cron: '30 * * * *'  # Tenta rodar no minuto 30
  workflow_dispatch: # Mantém o botão de rodar manual

jobs:
  build:
    runs-on: ubuntu-latest
    # ESSA LINHA ABAIXO É A MAIS IMPORTANTE PARA O VOLUME
    permissions:
      contents: write 

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar Script de Notícias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Publicar alterações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Auto-update: Volume e Histórico [$(date)]" || exit 0
          git push
