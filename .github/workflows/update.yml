name: Atualizar Site de Notícias
on:
  schedule:
    - cron: '0 * * * *' # Roda a cada 60 minutos (hora em hora)
  workflow_dispatch: # Permite-te rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar Script de Notícias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Puxa a chave secreta
        run: python script.py

      - name: Publicar alterações
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Notícias atualizadas automaticamente" || exit 0
          git push
