name: Atualizar Site de Noticias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install google-generativeai feedparser beautifulsoup4 pytz

      - name: Rodar Script de Noticias
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

     - name: Publicar alteracoes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Debug: Mostra no log se os arquivos foram criados
          ls -R materia/ || echo "Pasta materia vazia"
          
          git add .
          # O comando abaixo evita o erro se não houver nada para commitar
          git diff --quiet && git diff --staged --quiet || (git commit -m "Fix: Deploy materias [$(date)]" && git push)
